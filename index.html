<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile Links</title>
    <style>
        /* Reset & Base Style */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Profile Section */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 30px; }

        /* Links Section */
        .links { display: flex; flex-direction: column; gap: 15px; }
        
        .link-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" class="profile-img">
        
        <h1>verss</h1>
        <p>Junior Developer & Tech Enthusiast</p>

        <div class="links">
    <a href="https://google.com" target="_blank" class="link-card">🌐 My Portfolio</a>
    <a href="https://instagram.com/bentar_yoko" target="_blank" class="link-card">📸 Instagram</a>
    <a href="https://tiktok.com/@bentar_yoko" target="_blank" class="link-card">👔 TikTok</a>
    <a href="https://youtube.com/@verss-v3l" target="_blank" class="link-card">🎮 YouTube Ch</a>
    <a href="https://wa.me/6283156476803" target="_blank" class="link-card">💬 Hubungi Saya (WhatsApp)</a>
</div>
    </div>

</body>
</html>
